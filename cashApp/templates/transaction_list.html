<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #1e1e27;
      --border: #2a2a35;
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --blue-glow: rgba(59,130,246,0.3);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.1);
      --red: #ff3b3b;
      --red-dim: rgba(255,59,59,0.1);
      --text: #f0eff4;
      --muted: #8b8a98;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === Header === */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-title-wrap {}

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--blue-dim);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--blue);
      text-decoration: none;
      box-shadow: 0 4px 16px var(--blue-glow);
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      white-space: nowrap;
    }
    .add-btn:hover { background: #2563eb; box-shadow: 0 6px 24px var(--blue-glow); }
    .add-btn:active { transform: scale(0.97); }
    .add-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2.5; stroke-linecap: round;
    }

    /* === Summary Cards === */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    @media (max-width: 480px) {
      .summary { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.income::before { background: var(--green); }
    .stat-card.expense::before { background: var(--red); }
    .stat-card.balance::before { background: var(--blue); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .income .dot { background: var(--green); }
    .expense .dot { background: var(--red); }
    .balance .dot { background: var(--blue); }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .income .stat-value { color: var(--green); }
    .expense .stat-value { color: var(--red); }
    .balance .stat-value { color: var(--blue); }

    /* === Divider === */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 20px;
    }

    /* === Transaction List === */
    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.18s, background 0.18s;
    }
    .tx-item:hover {
      border-color: #3a3a4a;
      background: #1c1c24;
    }

    .tx-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .tx-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tx-dot.income { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .tx-dot.expense { background: var(--red); box-shadow: 0 0 6px rgba(255,59,59,0.5); }

    .tx-info { min-width: 0; }

    .tx-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-type {
      font-size: 12px;
      font-weight: 500;
      margin-top: 3px;
      text-transform: capitalize;
    }
    .tx-type.income { color: var(--green); }
    .tx-type.expense { color: var(--red); }

    .tx-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .tx-amount {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }
    .tx-amount.income { color: var(--green); }
    .tx-amount.expense { color: var(--red); }

    .tx-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tx-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .tx-actions a svg {
      width: 13px; height: 13px;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .tx-actions a.edit svg { stroke: var(--blue); }
    .tx-actions a.edit:hover { background: var(--blue-dim); border-color: rgba(59,130,246,0.3); }

    .tx-actions a.delete svg { stroke: var(--red); }
    .tx-actions a.delete:hover { background: var(--red-dim); border-color: rgba(255,59,59,0.3); }

    /* === Empty State === */
    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-state svg {
      width: 40px; height: 40px;
      stroke: #3a3a4a; fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 14px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="page-header">
      <div class="page-title-wrap">
        <span class="tag">Cash Management</span>
        <h2>Transactions</h2>
      </div>
      <a href="{% url 'transaction_create' %}" class="add-btn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Transaction
      </a>
    </div>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="stat-card income">
        <div class="stat-label"><span class="dot"></span>Income</div>
        <div class="stat-value">{{ total_income }}</div>
      </div>
      <div class="stat-card expense">
        <div class="stat-label"><span class="dot"></span>Expense</div>
        <div class="stat-value">{{ total_expense }}</div>
      </div>
      <div class="stat-card balance">
        <div class="stat-label"><span class="dot"></span>Balance</div>
        <div class="stat-value">{{ balance }}</div>
      </div>
    </div>

    <hr class="divider">

    <!-- Transaction List -->
    <div class="tx-list">
      {% for t in transactions %}
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-dot {{ t.type }}"></div>
            <div class="tx-info">
              <div class="tx-title">{{ t.title }}</div>
              <div class="tx-type {{ t.type }}">{{ t.type }}</div>
            </div>
          </div>
          <div class="tx-right">
            <span class="tx-amount {{ t.type }}">{{ t.amount }}</span>
            <div class="tx-actions">
              <a href="{% url 'transaction_edit' t.pk %}" class="edit" title="Edit">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </a>
              <a href="{% url 'transaction_delete' t.pk %}" class="delete" title="Delete">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </a>
            </div>
          </div>
        </div>
      {% empty %}
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <p>No transactions yet. Add your first one!</p>
        </div>
      {% endfor %}
    </div>

  </div>
</body>
</html>
