<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Sign Up — CashManager</title>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-soft: rgba(99,102,241,0.06);
      --primary-border: rgba(99,102,241,0.15);
      --primary-glow: rgba(99,102,241,0.25);
      --emerald: #10b981;
      --rose: #f43f5e;
      --rose-soft: rgba(244,63,94,0.08);
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text2: #334155;
      --text3: #475569;
      --text4: #94a3b8;
      --border: #e2e8f0;
      --radius: 12px;
      --font: 'Inter', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    
    .register-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 520px; padding: 48px; box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.05); }
    .form-header { text-align: center; margin-bottom: 36px; }
    .brand-logo { width: 44px; height: 44px; border-radius: var(--radius); background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(99,102,241,0.35); }
    .brand-logo i { color: #fff; font-size: 22px; }
    .form-title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .form-sub { font-size: 14px; color: var(--text3); }

    .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 576px) { .grid-fields { grid-template-columns: 1fr; } }

    .field { margin-bottom: 20px; }
    .field.no-margin { margin-bottom: 0; }
    .field-label { font-size: 13px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 8px; }
    .field-label .req { color: var(--rose); margin-left: 2px; }
    
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text4); font-size: 18px; pointer-events: none; }
    .ds-input, .ds-select { width: 100%; height: 46px; padding: 0 16px 0 44px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; color: var(--text); outline: none; appearance: none; }
    .ds-input:focus, .ds-select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); background: #fff; }

    .btn-submit { width: 100%; height: 48px; background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); color: #fff; border: none; border-radius: var(--radius); font-size: 14.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 18px var(--primary-glow); margin-top: 8px; }
    .btn-submit:hover { transform: translateY(-1.5px); box-shadow: 0 8px 24px rgba(99,102,241,0.35); }

    .alert-error { display: flex; align-items: flex-start; gap: 12px; background: var(--rose-soft); border: 1px solid rgba(244,63,94,0.15); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 24px; font-size: 13.5px; color: var(--rose); font-weight: 500; }
    .form-footer { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 13.5px; }
    .form-footer a { font-weight: 700; color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="form-header">
      <div class="brand-logo"><i class="ti ti-currency-dollar"></i></div>
      <h1 class="form-title">Create Account</h1>
      <p class="form-sub">Get started with CashManager system today</p>
    </div>

    {% if messages %}
      {% for message in messages %}
      <div class="alert-error">
        <i class="ti ti-alert-circle"></i>
        <span>{{ message }}</span>
      </div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'signup' %}">
      {% csrf_token %}
      <div class="grid-fields">
        <div class="field no-margin">
          <label class="field-label">Username <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-user input-icon"></i>
            <input type="text" name="username" class="ds-input" placeholder="e.g. johndoe" required />
          </div>
        </div>
        <div class="field no-margin">
          <label class="field-label">Full Name</label>
          <div class="input-wrap">
            <i class="ti ti-id input-icon"></i>
            <input type="text" name="full_name" class="ds-input" placeholder="e.g. John Doe" />
          </div>
        </div>
      </div>

      <div class="grid-fields">
        <div class="field no-margin">
          <label class="field-label">Email Address <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-mail input-icon"></i>
            <input type="email" name="email" class="ds-input" placeholder="name@example.com" required />
          </div>
        </div>
        <div class="field no-margin">
          <label class="field-label">Phone Number</label>
          <div class="input-wrap">
            <i class="ti ti-phone input-icon"></i>
            <input type="text" name="phone" class="ds-input" placeholder="+88017..." />
          </div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">User Type <span class="req">*</span></label>
        <div class="input-wrap">
          <i class="ti ti-users input-icon" style="z-index: 10;"></i>
          <select name="user_type" class="ds-select" style="padding-left: 44px;" required>
            <option value="user">Regular User</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
      </div>

      <div class="grid-fields">
        <div class="field no-margin">
          <label class="field-label">Password <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-lock input-icon"></i>
            <input type="password" name="password" class="ds-input" placeholder="Min. 8 characters" required />
          </div>
        </div>
        <div class="field no-margin">
          <label class="field-label">Confirm Password <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-shield-check input-icon"></i>
            <input type="password" name="confirm_password" class="ds-input" placeholder="Confirm" required />
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="ti ti-user-plus"></i> Register Workspace
      </button>
    </form>

    <div class="form-footer">
      <span>Already have an account?</span>
      <a href="{% url 'login' %}">Sign In</a>
    </div>
  </div>
</body>
</html>
