<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Cash Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060608; --surface: #0e0e12; --surface2: #141418;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
      --indigo: #6366f1; --indigo-mid: #4f46e5;
      --indigo-glow: rgba(99,102,241,0.35); --indigo-fog: rgba(99,102,241,0.08);
      --indigo-line: rgba(99,102,241,0.3);
      --emerald: #10b981; --rose: #f43f5e; --rose-fog: rgba(244,63,94,0.1);
      --text: #f8f8fc; --text2: #a8a8c0; --text3: #52526a;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 10px; --radius-lg: 14px; --radius-xl: 20px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; top: -160px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px; pointer-events: none;
      background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
    }
    body::after {
      content: ''; position: fixed; bottom: -100px; right: -80px;
      width: 400px; height: 400px; pointer-events: none;
      background: radial-gradient(ellipse, rgba(16,185,129,0.05) 0%, transparent 70%);
    }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 40px; width: 100%; max-width: 420px;
      position: relative; animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
    }

    .card-header { margin-bottom: 28px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--indigo); margin-bottom: 12px;
    }
    .eyebrow-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--indigo);
      box-shadow: 0 0 6px rgba(99,102,241,0.7);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.75); }
    }
    h1 { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: var(--text2); }

    .django-messages { margin-bottom: 18px; }
    .msg {
      font-size: 13px; color: var(--rose); background: var(--rose-fog);
      border: 1px solid rgba(244,63,94,0.22); border-radius: var(--radius);
      padding: 11px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .msg svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0; }

    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap .icon-left {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none; transition: stroke var(--transition);
    }
    .input-wrap:focus-within .icon-left { stroke: var(--indigo); }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 44px 12px 40px;
      font-size: 14px; font-family: var(--font); color: var(--text); outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      background: #1a1a20;
    }
    input::placeholder { color: var(--text3); }
    .toggle-pass {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; border-radius: 6px; transition: background var(--transition);
    }
    .toggle-pass:hover { background: rgba(255,255,255,0.06); }
    .toggle-pass svg {
      width: 15px; height: 15px; stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block;
      transition: stroke var(--transition);
    }
    .toggle-pass:hover svg { stroke: var(--indigo); }

    .btn-login {
      width: 100%; padding: 13px; border: none; border-radius: var(--radius);
      background: var(--indigo); color: #fff; font-family: var(--font);
      font-size: 14px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 20px var(--indigo-glow), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: all var(--transition); margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--indigo-mid); box-shadow: 0 6px 28px var(--indigo-glow); transform: translateY(-1px); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login svg { width:15px; height:15px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    .stats-strip {
      display: grid; grid-template-columns: repeat(3,1fr);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; margin-top: 24px;
    }
    .stat-cell {
      background: var(--surface2); padding: 12px 10px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-cell .val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
    .stat-cell .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-top: 4px; }
    .stat-cell.income .val  { color: var(--emerald); }
    .stat-cell.expense .val { color: var(--rose); }
    .stat-cell.balance .val { color: var(--indigo); }

    .card-footer {
      margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .card-footer span { font-size: 13px; color: var(--text3); }
    .card-footer a { font-size: 13px; font-weight: 600; color: var(--indigo); text-decoration: none; transition: color var(--transition); }
    .card-footer a:hover { color: #818cf8; }

    @media (max-width: 480px) {
      .login-card { padding: 30px 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="eyebrow"><span class="eyebrow-dot"></span>Cash Manager</div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to manage your transactions</p>
    </div>

    {% if messages %}
      <div class="django-messages">
        {% for message in messages %}
          <div class="msg">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_username">Username</label>
        <div class="input-wrap">
          <svg class="icon-left" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" name="username" id="id_username" placeholder="Enter your username" autocomplete="username" autofocus>
        </div>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <div class="input-wrap">
          <svg class="icon-left" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" id="id_password" placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="toggle-pass" onclick="togglePassword()" title="Show/hide password">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Sign In
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="stats-strip">
      <div class="stat-cell income"><div class="val">Income</div><div class="lbl">Track</div></div>
      <div class="stat-cell expense"><div class="val">Expense</div><div class="lbl">Control</div></div>
      <div class="stat-cell balance"><div class="val">Balance</div><div class="lbl">Grow</div></div>
    </div>

    <div class="card-footer">
      <span>Don't have an account?</span>
      <a href="{% url 'signup' %}">Create one</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('id_password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>
</body>
</html>
