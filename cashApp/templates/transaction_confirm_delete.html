<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Transaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --border: #2a2a35;
      --red: #ff3b3b;
      --red-dim: rgba(255, 59, 59, 0.12);
      --red-glow: rgba(255, 59, 59, 0.35);
      --text: #f0eff4;
      --muted: #8b8a98;
      --cancel-bg: #23232e;
      --cancel-hover: #2e2e3c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255,59,59,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      max-width: 420px;
      width: 100%;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--red) 50%, transparent 100%);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,59,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .icon-wrap svg {
      width: 24px;
      height: 24px;
      stroke: var(--red);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tag {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red);
      background: var(--red-dim);
      border: 1px solid rgba(255,59,59,0.2);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .description {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .tx-name {
      display: inline-block;
      background: rgba(240,239,244,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 12px 0 24px;
      width: 100%;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
    }

    .warning-note {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,59,59,0.06);
      border: 1px solid rgba(255,59,59,0.15);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 28px;
    }

    .warning-note svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      stroke: var(--red);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-top: 1px;
    }

    .warning-note span {
      font-size: 13px;
      color: rgba(255,59,59,0.85);
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px 16px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      background: var(--cancel-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-cancel:hover {
      background: var(--cancel-hover);
      color: var(--text);
      border-color: #3a3a4a;
    }

    .btn-delete {
      flex: 1.4;
      padding: 11px 16px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--red);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 16px var(--red-glow);
    }
    .btn-delete:hover {
      background: #e52e2e;
      box-shadow: 0 6px 24px var(--red-glow);
    }
    .btn-delete:active { transform: scale(0.97); }

    .btn-delete svg, .btn-cancel svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </div>

    <span class="tag">Destructive Action</span>

    <h2>Delete Transaction</h2>
    <p class="description">You're about to permanently delete:</p>

    <div class="tx-name">{{ transaction.title }}</div>

    <div class="warning-note">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>This action cannot be undone. The transaction record will be removed permanently.</span>
    </div>

    <hr class="divider">

    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <a href="{% url 'project_detail' pk=transaction.project.pk %}" class="btn-cancel">
          <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Cancel
        </a>
        <button type="submit" class="btn-delete">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Yes, Delete
        </button>
      </div>
    </form>

  </div>
</body>
</html>
